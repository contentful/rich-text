---
name: "CodeQL Scan for GitHub Actions Workflow"

on:
  push:
    branches: [master]
    paths: [".github/workflows/**"]
  pull_request:
    branches: [master]
    paths: [".github/workflows/**"]

jobs:
  analyze:
    name: Analyze GitHub Actions workflows
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3
        with:
          languages: actions

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3
        with:
          category: actions
